<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <title>Admin panel | kupujspolu.sk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2e;
      --card-2:#0f172a;
      --line:#24314d;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --muted-2:#94a3b8;
      --blue:#2563eb;
      --blue-2:#1d4ed8;
      --green:#16a34a;
      --green-2:#15803d;
      --orange:#f59e0b;
      --red:#ef4444;
      --gray:#64748b;
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:20px;
    }

    .wrap{
      max-width:1450px;
      margin:0 auto;
    }

    h1{
      margin:0 0 18px;
      font-size:34px;
    }

    h2{
      margin:0 0 14px;
      font-size:22px;
    }

    .box{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:16px;
      margin-bottom:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:1.1fr 1.2fr 220px 180px 180px;
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    input, select, button, textarea{
      width:100%;
      border:none;
      border-radius:10px;
      padding:12px 14px;
      font:inherit;
    }

    input, select, textarea{
      background:#0b1324;
      color:var(--text);
      border:1px solid var(--line);
    }

    button{
      background:var(--blue);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }

    button:hover{
      background:var(--blue-2);
    }

    .btn-secondary{
      background:#334155;
    }

    .btn-secondary:hover{
      background:#475569;
    }

    .btn-green{
      background:var(--green);
    }

    .btn-green:hover{
      background:var(--green-2);
    }

    .btn-orange{
      background:#b45309;
    }

    .btn-orange:hover{
      background:#92400e;
    }

    .error{
      color:#fecaca;
      margin-top:10px;
      font-size:14px;
      min-height:18px;
    }

    .ok{
      color:#bbf7d0;
      margin-top:10px;
      font-size:14px;
      min-height:18px;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted-2);
      font-size:14px;
      margin-top:10px;
    }

    .table-wrap{
      overflow:auto;
      border-radius:12px;
      border:1px solid var(--line);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1350px;
      background:var(--card-2);
    }

    th, td{
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      text-align:left;
      font-size:14px;
      vertical-align:top;
    }

    th{
      background:#0b1324;
      color:var(--muted);
      position:sticky;
      top:0;
      z-index:1;
      white-space:nowrap;
    }

    tr.data-row{
      cursor:pointer;
    }

    tr.data-row:hover{
      background:#16213a;
    }

    .status{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .status-paid{ background:rgba(22,163,74,.18); color:#bbf7d0; }
    .status-pending_payment{ background:rgba(245,158,11,.18); color:#fde68a; }
    .status-checkout_created{ background:rgba(37,99,235,.18); color:#bfdbfe; }
    .status-payment_failed{ background:rgba(239,68,68,.18); color:#fecaca; }
    .status-other{ background:rgba(100,116,139,.25); color:#e2e8f0; }

    .invoice-nevystavena{
      background:rgba(245,158,11,.18);
      color:#fde68a;
    }

    .invoice-vystavena{
      background:rgba(22,163,74,.18);
      color:#bbf7d0;
    }

    .detail-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
    }

    .detail-item{
      background:#0b1324;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
    }

    .detail-item strong{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .detail-item span{
      color:var(--text);
      word-break:break-word;
      white-space:pre-wrap;
    }

    .detail-item.full{
      grid-column:1 / -1;
    }

    .invoice-panel{
      margin-top:18px;
      padding:16px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#0b1324;
    }

    .invoice-grid{
      display:grid;
      grid-template-columns:1fr 1fr 220px 220px;
      gap:12px;
      align-items:end;
    }

    .muted{
      color:var(--muted-2);
    }

    .hidden{
      display:none;
    }

    .selected-id{
      color:#93c5fd;
      font-weight:700;
    }

    @media (max-width: 1200px){
      .grid{
        grid-template-columns:1fr;
      }

      .invoice-grid{
        grid-template-columns:1fr;
      }

      .detail-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔐 Admin panel</h1>

    <div class="box">
      <div class="grid">
        <div class="field">
          <label for="secret">ADMIN SECRET</label>
          <input type="password" id="secret" placeholder="Zadaj admin heslo" />
        </div>

        <div class="field">
          <label for="search">Vyhľadávanie</label>
          <input type="text" id="search" placeholder="Upload ID, email, značka, model, meno, firma..." />
        </div>

        <div class="field">
          <label for="statusFilter">Status objednávky</label>
          <select id="statusFilter">
            <option value="all">Všetky</option>
            <option value="paid">paid</option>
            <option value="pending_payment">pending_payment</option>
            <option value="checkout_created">checkout_created</option>
            <option value="payment_failed">payment_failed</option>
          </select>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="loadBtn">Načítať objednávky</button>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="exportBtn" class="btn-green">Export do Excelu</button>
        </div>
      </div>

      <div class="error" id="error"></div>
      <div class="ok" id="ok"></div>

      <div class="meta">
        <div>Načítané záznamy: <strong id="countAll">0</strong></div>
        <div>Zobrazené po filtroch: <strong id="countFiltered">0</strong></div>
      </div>
    </div>

    <div class="box">
      <div class="table-wrap">
        <table id="table">
          <thead>
            <tr>
              <th>Upload ID</th>
              <th>Dátum</th>
              <th>Značka</th>
              <th>Model</th>
              <th>Cena</th>
              <th>Email</th>
              <th>Typ</th>
              <th>Plán</th>
              <th>Status objednávky</th>
              <th>Faktúra</th>
              <th>Číslo faktúry</th>
              <th>Dátum vystavenia</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="box hidden" id="detailBox">
      <h2>Detail objednávky</h2>
      <div class="detail-grid" id="detailGrid"></div>

      <div class="invoice-panel">
        <h2 style="font-size:20px;">Fakturácia pre: <span class="selected-id" id="selectedUploadId">—</span></h2>

        <div class="invoice-grid">
          <div class="field">
            <label for="invoiceStatus">Stav faktúry</label>
            <select id="invoiceStatus">
              <option value="nevystavena">nevystavena</option>
              <option value="vystavena">vystavena</option>
            </select>
          </div>

          <div class="field">
            <label for="invoiceNumber">Číslo faktúry</label>
            <input type="text" id="invoiceNumber" placeholder="napr. 2026-001" />
          </div>

          <div class="field">
            <label for="invoiceIssuedAt">Dátum vystavenia</label>
            <input type="datetime-local" id="invoiceIssuedAt" />
          </div>

          <div class="field">
            <label>&nbsp;</label>
            <button id="saveInvoiceBtn" class="btn-green">Uložiť faktúru</button>
          </div>
        </div>

        <div style="margin-top:12px;display:grid;grid-template-columns:220px 220px;gap:12px;">
          <button id="markIssuedNowBtn" class="btn-orange">Označiť vystavenú teraz</button>
          <button id="markNotIssuedBtn" class="btn-secondary">Označiť ako nevystavenú</button>
        </div>

        <div class="muted" style="margin-top:12px;">
          Po kliknutí na riadok nižšie vieš upraviť stav fakturácie, dátum a číslo faktúry.
        </div>
      </div>
    </div>
  </div>

  <script>
    let allUploads = [];
    let filteredUploads = [];
    let selectedUpload = null;

    const secretInput = document.getElementById('secret');
    const searchInput = document.getElementById('search');
    const statusFilter = document.getElementById('statusFilter');
    const loadBtn = document.getElementById('loadBtn');
    const exportBtn = document.getElementById('exportBtn');
    const errorDiv = document.getElementById('error');
    const okDiv = document.getElementById('ok');
    const tbody = document.querySelector('#table tbody');
    const countAll = document.getElementById('countAll');
    const countFiltered = document.getElementById('countFiltered');
    const detailBox = document.getElementById('detailBox');
    const detailGrid = document.getElementById('detailGrid');

    const selectedUploadIdEl = document.getElementById('selectedUploadId');
    const invoiceStatusEl = document.getElementById('invoiceStatus');
    const invoiceNumberEl = document.getElementById('invoiceNumber');
    const invoiceIssuedAtEl = document.getElementById('invoiceIssuedAt');
    const saveInvoiceBtn = document.getElementById('saveInvoiceBtn');
    const markIssuedNowBtn = document.getElementById('markIssuedNowBtn');
    const markNotIssuedBtn = document.getElementById('markNotIssuedBtn');

    function showError(msg) {
      errorDiv.textContent = msg || '';
      okDiv.textContent = '';
    }

    function showOk(msg) {
      okDiv.textContent = msg || '';
      errorDiv.textContent = '';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value) {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString('sk-SK');
    }

    function formatBuyerType(value) {
      if (value === 'company') return 'Firma / podnikateľ';
      if (value === 'private') return 'Súkromná osoba';
      return value || '';
    }

    function formatFee(value) {
      if (String(value) === '399') return '399 EUR';
      if (String(value) === '129') return '129 EUR';
      return value || '';
    }

    function getStatusClass(status) {
      if (status === 'paid') return 'status-paid';
      if (status === 'pending_payment') return 'status-pending_payment';
      if (status === 'checkout_created') return 'status-checkout_created';
      if (status === 'payment_failed') return 'status-payment_failed';
      return 'status-other';
    }

    function getInvoiceClass(status) {
      if (status === 'vystavena') return 'invoice-vystavena';
      return 'invoice-nevystavena';
    }

    function toDatetimeLocalValue(value) {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '';
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function datetimeLocalToIso(value) {
      if (!value) return null;
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return null;
      return d.toISOString();
    }

    function renderTable(rows) {
      tbody.innerHTML = '';

      rows.forEach((u) => {
        const tr = document.createElement('tr');
        tr.className = 'data-row';

        tr.innerHTML = `
          <td>${escapeHtml(u.uploadId || '')}</td>
          <td>${escapeHtml(formatDate(u.createdAt || ''))}</td>
          <td>${escapeHtml(u.znacka || '')}</td>
          <td>${escapeHtml(u.model || '')}</td>
          <td>${escapeHtml(u.cena || '')} €</td>
          <td>${escapeHtml(u.email || '')}</td>
          <td>${escapeHtml(formatBuyerType(u.buyerType || ''))}</td>
          <td>${escapeHtml(formatFee(u.fee || ''))}</td>
          <td><span class="status ${getStatusClass(u.status)}">${escapeHtml(u.status || '')}</span></td>
          <td><span class="status ${getInvoiceClass(u.invoiceStatus)}">${escapeHtml(u.invoiceStatus || 'nevystavena')}</span></td>
          <td>${escapeHtml(u.invoiceNumber || '')}</td>
          <td>${escapeHtml(formatDate(u.invoiceIssuedAt || ''))}</td>
        `;

        tr.addEventListener('click', () => renderDetail(u));
        tbody.appendChild(tr);
      });

      countFiltered.textContent = String(rows.length);
    }

    function renderDetail(u) {
      selectedUpload = u;
      detailBox.classList.remove('hidden');

      const fullNameOrCompany = u.buyerType === 'company'
        ? (u.companyName || '')
        : (u.fullName || '');

      const billingAddress = [
        u.billingAddressStreet || '',
        u.billingAddressCity || '',
        u.billingAddressZip || ''
      ].filter(Boolean).join(', ');

      detailGrid.innerHTML = `
        <div class="detail-item"><strong>Upload ID</strong><span>${escapeHtml(u.uploadId || '')}</span></div>
        <div class="detail-item"><strong>Status objednávky</strong><span>${escapeHtml(u.status || '')}</span></div>

        <div class="detail-item"><strong>Dátum vytvorenia</strong><span>${escapeHtml(formatDate(u.createdAt || ''))}</span></div>
        <div class="detail-item"><strong>Posledná zmena</strong><span>${escapeHtml(formatDate(u.updatedAt || ''))}</span></div>

        <div class="detail-item"><strong>Značka</strong><span>${escapeHtml(u.znacka || '')}</span></div>
        <div class="detail-item"><strong>Model</strong><span>${escapeHtml(u.model || '')}</span></div>

        <div class="detail-item"><strong>Cena</strong><span>${escapeHtml(u.cena || '')} €</span></div>
        <div class="detail-item"><strong>Plán</strong><span>${escapeHtml(formatFee(u.fee || ''))}</span></div>

        <div class="detail-item"><strong>Typ zákazníka</strong><span>${escapeHtml(formatBuyerType(u.buyerType || ''))}</span></div>
        <div class="detail-item"><strong>Meno / firma</strong><span>${escapeHtml(fullNameOrCompany)}</span></div>

        <div class="detail-item"><strong>Kontaktná osoba</strong><span>${escapeHtml(u.contactPerson || '')}</span></div>
        <div class="detail-item"><strong>Email</strong><span>${escapeHtml(u.email || '')}</span></div>

        <div class="detail-item"><strong>Telefón</strong><span>${escapeHtml(u.telefon || '')}</span></div>
        <div class="detail-item"><strong>IČO</strong><span>${escapeHtml(u.ico || '')}</span></div>

        <div class="detail-item"><strong>DIČ</strong><span>${escapeHtml(u.dic || '')}</span></div>
        <div class="detail-item"><strong>IČ DPH</strong><span>${escapeHtml(u.icdph || '')}</span></div>

        <div class="detail-item"><strong>Stav faktúry</strong><span>${escapeHtml(u.invoiceStatus || 'nevystavena')}</span></div>
        <div class="detail-item"><strong>Číslo faktúry</strong><span>${escapeHtml(u.invoiceNumber || '')}</span></div>

        <div class="detail-item"><strong>Dátum vystavenia</strong><span>${escapeHtml(formatDate(u.invoiceIssuedAt || ''))}</span></div>
        <div class="detail-item"><strong>Súbor</strong><span>${escapeHtml(u.fileOriginalName || '')}</span></div>

        <div class="detail-item full"><strong>Fakturačná adresa</strong><span>${escapeHtml(billingAddress)}</span></div>
        <div class="detail-item full"><strong>Poznámka</strong><span>${escapeHtml(u.billingNote || '')}</span></div>
      `;

      selectedUploadIdEl.textContent = u.uploadId || '—';
      invoiceStatusEl.value = u.invoiceStatus || 'nevystavena';
      invoiceNumberEl.value = u.invoiceNumber || '';
      invoiceIssuedAtEl.value = toDatetimeLocalValue(u.invoiceIssuedAt || '');
    }

    function applyFilters() {
      const q = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;

      filteredUploads = allUploads.filter((u) => {
        const matchesStatus = status === 'all' ? true : (u.status === status);

        const haystack = [
          u.uploadId,
          u.email,
          u.znacka,
          u.model,
          u.fullName,
          u.companyName,
          u.contactPerson,
          u.ico,
          u.telefon,
          u.status,
          u.fee,
          u.invoiceStatus,
          u.invoiceNumber
        ]
          .filter(Boolean)
          .join(' ')
          .toLowerCase();

        const matchesSearch = q ? haystack.includes(q) : true;

        return matchesStatus && matchesSearch;
      });

      renderTable(filteredUploads);
    }

    async function loadData() {
      const secret = secretInput.value.trim();
      showError('');
      showOk('');
      detailBox.classList.add('hidden');
      detailGrid.innerHTML = '';
      selectedUpload = null;

      if (!secret) {
        showError('Zadaj ADMIN SECRET.');
        return;
      }

      loadBtn.disabled = true;
      loadBtn.textContent = 'Načítavam...';

      try {
        const res = await fetch('/api/uploads', {
          headers: {
            'x-admin-secret': secret
          }
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || 'Unauthorized alebo chyba servera.');
        }

        allUploads = Array.isArray(data.uploads) ? data.uploads : [];
        countAll.textContent = String(allUploads.length);

        applyFilters();
        showOk('Objednávky boli úspešne načítané.');
      } catch (err) {
        allUploads = [];
        filteredUploads = [];
        countAll.textContent = '0';
        countFiltered.textContent = '0';
        tbody.innerHTML = '';
        showError(err.message || 'Nepodarilo sa načítať objednávky.');
      } finally {
        loadBtn.disabled = false;
        loadBtn.textContent = 'Načítať objednávky';
      }
    }

    function downloadCsv(filename, content) {
      const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const str = String(value ?? '');
      return '"' + str.replace(/"/g, '""') + '"';
    }

    function exportToExcelCsv() {
      if (!filteredUploads.length) {
        showError('Nie sú žiadne dáta na export.');
        return;
      }

      const headers = [
        'Upload ID',
        'Created At',
        'Updated At',
        'Status',
        'Fee',
        'Invoice Status',
        'Invoice Issued At',
        'Invoice Number',
        'Buyer Type',
        'Full Name',
        'Company Name',
        'Contact Person',
        'Email',
        'Telefon',
        'Znacka',
        'Model',
        'Cena',
        'ICO',
        'DIC',
        'ICDPH',
        'Billing Street',
        'Billing City',
        'Billing ZIP',
        'Billing Note',
        'File Original Name',
        'File Storage Path'
      ];

      const rows = filteredUploads.map((u) => ([
        u.uploadId || '',
        u.createdAt || '',
        u.updatedAt || '',
        u.status || '',
        u.fee || '',
        u.invoiceStatus || '',
        u.invoiceIssuedAt || '',
        u.invoiceNumber || '',
        u.buyerType || '',
        u.fullName || '',
        u.companyName || '',
        u.contactPerson || '',
        u.email || '',
        u.telefon || '',
        u.znacka || '',
        u.model || '',
        u.cena || '',
        u.ico || '',
        u.dic || '',
        u.icdph || '',
        u.billingAddressStreet || '',
        u.billingAddressCity || '',
        u.billingAddressZip || '',
        u.billingNote || '',
        u.fileOriginalName || '',
        u.fileStoragePath || ''
      ]));

      const csv =
        '\uFEFF' +
        headers.map(csvEscape).join(';') +
        '\n' +
        rows.map(r => r.map(csvEscape).join(';')).join('\n');

      const date = new Date();
      const stamp = [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, '0'),
        String(date.getDate()).padStart(2, '0'),
        '_',
        String(date.getHours()).padStart(2, '0'),
        String(date.getMinutes()).padStart(2, '0')
      ].join('');

      downloadCsv(`kupujspolu_export_${stamp}.csv`, csv);
      showOk('Export bol vytvorený. Súbor otvoríš v Exceli.');
    }

    async function saveInvoice(customStatus = null, useNowAsDate = false) {
      if (!selectedUpload) {
        showError('Najprv klikni na konkrétnu objednávku v tabuľke.');
        return;
      }

      const secret = secretInput.value.trim();
      if (!secret) {
        showError('Zadaj ADMIN SECRET.');
        return;
      }

      let finalStatus = customStatus || invoiceStatusEl.value;
      let finalIssuedAt = invoiceIssuedAtEl.value;

      if (useNowAsDate) {
        finalIssuedAt = toDatetimeLocalValue(new Date().toISOString());
        invoiceIssuedAtEl.value = finalIssuedAt;
      }

      if (finalStatus === 'nevystavena') {
        finalIssuedAt = '';
      }

      saveInvoiceBtn.disabled = true;
      saveInvoiceBtn.textContent = 'Ukladám...';
      showError('');
      showOk('');

      try {
        const res = await fetch('/api/admin/invoice', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-secret': secret
          },
          body: JSON.stringify({
            uploadId: selectedUpload.uploadId,
            invoiceStatus: finalStatus,
            invoiceNumber: invoiceNumberEl.value.trim(),
            invoiceIssuedAt: finalStatus === 'vystavena'
              ? (datetimeLocalToIso(finalIssuedAt) || new Date().toISOString())
              : null
          })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || 'Nepodarilo sa uložiť faktúru.');
        }

        const updated = data.upload;
        if (!updated) {
          throw new Error('Server nevrátil aktualizovaný záznam.');
        }

        allUploads = allUploads.map((u) =>
          u.uploadId === updated.uploadId ? updated : u
        );

        applyFilters();
        renderDetail(updated);
        selectedUpload = updated;

        showOk('Fakturačné údaje boli uložené.');
      } catch (err) {
        showError(err.message || 'Chyba pri ukladaní faktúry.');
      } finally {
        saveInvoiceBtn.disabled = false;
        saveInvoiceBtn.textContent = 'Uložiť faktúru';
      }
    }

    loadBtn.addEventListener('click', loadData);
    exportBtn.addEventListener('click', exportToExcelCsv);
    searchInput.addEventListener('input', applyFilters);
    statusFilter.addEventListener('change', applyFilters);

    saveInvoiceBtn.addEventListener('click', () => saveInvoice());
    markIssuedNowBtn.addEventListener('click', () => {
      invoiceStatusEl.value = 'vystavena';
      saveInvoice('vystavena', true);
    });
    markNotIssuedBtn.addEventListener('click', () => {
      invoiceStatusEl.value = 'nevystavena';
      invoiceIssuedAtEl.value = '';
      saveInvoice('nevystavena', false);
    });
  </script>
</body>
</html>
